name: Verify dist

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run clean && npm run build
      - name: Check committed dist matches build
        run: git diff --exit-code dist
